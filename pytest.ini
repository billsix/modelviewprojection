[pytest]
pythonpath = src
markers =
    slow: heavy/long-running tests (e.g. free-symbol symbolic proofs); deselected by default, run with `pytest -m slow` (or `pytest -m ""` for everything)
; Doctests in the library are part of the suite -- a docstring example that no
; longer runs is a broken example in the book. (Four had been failing silently
; since the NumPy 2 scalar-repr change, because nothing collected them.)
;
; This list is a WORKAROUND, not the design -- see tasks/doctests-everywhere.md.
; `--doctest-modules` *imports* whatever it collects, and the runnable scripts
; execute at import: demos/demo01.py calls sys.exit() (which kills the pytest
; process with INTERNALERROR, not a test failure), other demos/ and notebooksrc/
; files enter their render loop, and mvpvisualization/ + wxapp*.py open windows.
; Once those scripts get `if __name__ == "__main__":` guards, this collapses to
; `testpaths = src tests` with no list, and doctests anywhere get picked up
; automatically. Until then, list the importable library modules.
testpaths =
    tests
    src/modelviewprojection/cayley
    src/modelviewprojection/framebuffer
    src/modelviewprojection/plotsforbook
    src/modelviewprojection/util
    src/modelviewprojection/mathutils.py
    src/modelviewprojection/matrix_stack.py
addopts = -m "not slow" --doctest-modules
